<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- Header (No TopAppBar as this is a transactional flow) -->
<header class="flex justify-between items-center px-margin-mobile h-16 w-full max-w-max-width mx-margin-desktop">
<button aria-label="Go back" class="p-2 rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<span class="font-headline-sm text-headline-sm font-semibold">Payment</span>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow flex flex-col justify-end max-w-max-width mx-margin-desktop w-full">
<!-- Summary Section (Top of screen content before sheet) -->
<div class="px-margin-mobile py-lg flex flex-col items-center justify-center flex-grow">
<div class="text-center mb-md">
<p class="font-body-md text-body-md text-on-surface-variant mb-xs">Amount to pay</p>
<h1 class="font-display-lg-mobile text-display-lg-mobile text-primary">$89.99</h1>
</div>
<div class="bg-surface-container-low rounded-xl p-md w-full max-w-md border border-outline-variant/30">
<div class="flex justify-between items-center mb-xs">
<span class="font-label-md text-label-md text-on-surface-variant">Plan</span>
<span class="font-label-md text-label-md font-semibold">Fiber Ultra 1Gbps</span>
</div>
<div class="flex justify-between items-center">
<span class="font-label-md text-label-md text-on-surface-variant">Due Date</span>
<span class="font-label-md text-label-md font-semibold">Oct 15, 2023</span>
</div>
</div>
</div>
<!-- Bottom Sheet Payment Selection -->
<div class="bg-surface rounded-t-[32px] px-margin-mobile py-lg shadow-[0px_-4px_20px_rgba(0,0,0,0.05)] border-t border-outline-variant/20 relative w-full">
<!-- Drag Handle -->
<div class="absolute top-4 left-1/2 transform -translate-x-1/2 w-12 h-1.5 bg-outline-variant/50 rounded-full"></div>
<h2 class="font-headline-sm text-headline-sm mb-md text-on-surface mt-sm">Select Payment Method</h2>
<div class="space-y-sm mb-xl">
<!-- UPI Option -->
<label class="flex items-center p-md border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors group relative overflow-hidden bg-surface-container-lowest">
<input checked="" class="sr-only peer" name="payment_method" type="radio" value="upi"/>
<div class="w-12 h-12 flex items-center justify-center bg-surface-container rounded-lg mr-sm text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">qr_code_scanner</span>
</div>
<div class="flex-grow">
<span class="block font-label-md text-label-md font-semibold text-on-surface">UPI</span>
<span class="block font-label-sm text-label-sm text-on-surface-variant">Google Pay, PhonePe, Paytm</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-on-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary rounded-xl pointer-events-none transition-colors"></div>
</label>
<!-- Card Option -->
<label class="flex items-center p-md border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors group relative overflow-hidden bg-surface-container-lowest">
<input class="sr-only peer" name="payment_method" type="radio" value="card"/>
<div class="w-12 h-12 flex items-center justify-center bg-surface-container rounded-lg mr-sm text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">credit_card</span>
</div>
<div class="flex-grow">
<span class="block font-label-md text-label-md font-semibold text-on-surface">Credit/Debit Card</span>
<span class="block font-label-sm text-label-sm text-on-surface-variant">Visa, Mastercard, RuPay</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-on-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary rounded-xl pointer-events-none transition-colors"></div>
</label>
<!-- Net Banking Option -->
<label class="flex items-center p-md border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors group relative overflow-hidden bg-surface-container-lowest">
<input class="sr-only peer" name="payment_method" type="radio" value="netbanking"/>
<div class="w-12 h-12 flex items-center justify-center bg-surface-container rounded-lg mr-sm text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<div class="flex-grow">
<span class="block font-label-md text-label-md font-semibold text-on-surface">Net Banking</span>
<span class="block font-label-sm text-label-sm text-on-surface-variant">All major banks supported</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-on-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary rounded-xl pointer-events-none transition-colors"></div>
</label>
<!-- Wallets Option -->
<label class="flex items-center p-md border border-outline-variant rounded-xl cursor-pointer hover:bg-surface-container-low transition-colors group relative overflow-hidden bg-surface-container-lowest">
<input class="sr-only peer" name="payment_method" type="radio" value="wallet"/>
<div class="w-12 h-12 flex items-center justify-center bg-surface-container rounded-lg mr-sm text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
</div>
<div class="flex-grow">
<span class="block font-label-md text-label-md font-semibold text-on-surface">Wallets</span>
<span class="block font-label-sm text-label-sm text-on-surface-variant">Amazon Pay, MobiKwik</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary transition-colors">
<div class="w-2.5 h-2.5 rounded-full bg-on-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-primary rounded-xl pointer-events-none transition-colors"></div>
</label>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary rounded-[16px] py-4 font-label-md text-label-md font-semibold hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all flex items-center justify-center shadow-sm">
                Proceed to Pay <span class="material-symbols-outlined ml-2 text-[20px]">arrow_forward</span>
</button>
</div>
</main>
</body></html>
